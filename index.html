<!DOCTYPE html>
<html>
<head>
<title>All Free Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px
}

.container{
background:#1e1e1e;
padding:30px;
border-radius:10px;
max-width:600px;
margin:auto
}

input,button{
padding:10px;
margin:10px;
width:90%
}

button{
background:black;
color:white;
border:none
}

h1{
margin-bottom:30px
}

.tool{
margin-top:30px
}

</style>

</head>

<body>

<div class="container">

<h1>All Free Online Tools</h1>

<!-- AGE CALCULATOR -->

<div class="tool">

<h2>Age Calculator</h2>

<input type="date" id="dob">

<button onclick="age()">Calculate Age</button>

<p id="ageResult"></p>

</div>

<!-- BMI CALCULATOR -->

<div class="tool">

<h2>BMI Calculator</h2>

<input type="number" id="weight" placeholder="Weight (kg)">

<input type="number" id="height" placeholder="Height (cm)">

<button onclick="bmi()">Calculate BMI</button>

<p id="bmiResult"></p>

</div>

<!-- PERCENTAGE CALCULATOR -->

<div class="tool">

<h2>Percentage Calculator</h2>

<input type="number" id="total" placeholder="Total">

<input type="number" id="value" placeholder="Value">

<button onclick="percent()">Calculate Percentage</button>

<p id="perResult"></p>

</div>

</div>

<script>

function age(){

let dob=new Date(document.getElementById("dob").value)

let today=new Date()

let age=today.getFullYear()-dob.getFullYear()

document.getElementById("ageResult").innerHTML="Age: "+age

}

function bmi(){

let w=document.getElementById("weight").value

let h=document.getElementById("height").value/100

let bmi=w/(h*h)

document.getElementById("bmiResult").innerHTML="BMI: "+bmi.toFixed(2)

}

function percent(){

let total=document.getElementById("total").value

let value=document.getElementById("value").value

let result=(value/total)*100

document.getElementById("perResult").innerHTML=result+" %"

}

</script>

</body>

  </html>
